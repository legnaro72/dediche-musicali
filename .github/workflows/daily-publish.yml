name: 🎵 Pubblicazione Giornaliera

on:
  schedule:
    - cron: '15 6 * 4-10 *'        # 08:15 Europe/Rome circa, periodo ora legale
    - cron: '15 7 * 11,12,1,2,3 *' # 08:15 Europe/Rome circa, periodo ora solare
  workflow_dispatch:
    inputs:
      date:
        description: 'Data da pubblicare (YYYY-MM-DD, default: oggi Rome)'
        required: false
        default: ''
      force_republish:
        description: 'Forza ripubblicazione anche se già pubblicata'
        required: false
        default: false
        type: boolean
      dedication_id:
        description: 'ID dedica specifica da pubblicare (opzionale)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run: simula senza modifiche reali'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Pubblica dedica del giorno
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Verifica ora italiana
        id: rome_time
        run: |
          ROME_HOUR="$(TZ=Europe/Rome date +%H)"
          ROME_DATE="$(TZ=Europe/Rome date +%F)"
          echo "hour=$ROME_HOUR" >> "$GITHUB_OUTPUT"
          echo "date=$ROME_DATE" >> "$GITHUB_OUTPUT"
          echo "Ora Europe/Rome: $ROME_DATE $ROME_HOUR:00"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze Python
        run: pip install -r requirements.txt

      - name: Sync da Google Sheet
        run: |
          TARGET_DATE="${{ inputs.date }}"
          [ -z "$TARGET_DATE" ] && TARGET_DATE="$(TZ=Europe/Rome date +%F)"
          ARGS=()
          ARGS+=(--date "$TARGET_DATE")
          [ -n "${{ inputs.dedication_id }}" ] && ARGS+=(--id "${{ inputs.dedication_id }}")
          [ "${{ inputs.force_republish }}" = "true" ] && ARGS+=(--force-republish)
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          python scripts/sync_from_google_sheet.py "${ARGS[@]}"
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          DEFAULT_VOTE_URL: ${{ secrets.DEFAULT_VOTE_URL }}

      - name: Valida dati
        run: python scripts/validate_dedications.py
        env:
          DEFAULT_VOTE_URL: ${{ secrets.DEFAULT_VOTE_URL }}

      - name: Pubblica dedica del giorno
        run: |
          TARGET_DATE="${{ inputs.date }}"
          [ -z "$TARGET_DATE" ] && TARGET_DATE="$(TZ=Europe/Rome date +%F)"
          ARGS=()
          ARGS+=(--date "$TARGET_DATE")
          [ -n "${{ inputs.dedication_id }}" ] && ARGS+=(--id "${{ inputs.dedication_id }}")
          [ "${{ inputs.force_republish }}" = "true" ] && ARGS+=(--force-republish)
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          python scripts/publish_daily.py "${ARGS[@]}"
        env:
          DEFAULT_VOTE_URL: ${{ secrets.DEFAULT_VOTE_URL }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
          SITE_URL: ${{ secrets.SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMAGE_PROVIDER: ${{ secrets.IMAGE_PROVIDER }}

      - name: Setup Node.js
        if: ${{ inputs.dry_run != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze Node
        if: ${{ inputs.dry_run != 'true' }}
        run: npm ci

      - name: Build Astro
        if: ${{ inputs.dry_run != 'true' }}
        run: npm run build
        env:
          SITE_NAME: ${{ secrets.SITE_NAME }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Commit modifiche
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/images/dedications/ || true
          git diff --cached --quiet || git commit -m "🎵 Dedica del giorno - $(date +'%Y-%m-%d') [skip ci]"
          git push || true

      - name: Upload artifact Pages
        if: ${{ inputs.dry_run != 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy su GitHub Pages
        if: ${{ inputs.dry_run != 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Invia email notifica DDG online
        if: ${{ success() && inputs.dry_run != 'true' }}
        run: |
          if [ -z "$SMTP_HOST" ] || [ -z "$SMTP_USERNAME" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "SMTP non configurato: email notifica saltata."
            exit 0
          fi
          TARGET_DATE="${{ inputs.date }}"
          [ -z "$TARGET_DATE" ] && TARGET_DATE="$(TZ=Europe/Rome date +%F)"
          python scripts/send_deploy_email.py --date "$TARGET_DATE"
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          DEPLOY_NOTIFICATION_TO: ${{ secrets.DEPLOY_NOTIFICATION_TO || 'massimiliano.ferrando@gmail.com' }}
